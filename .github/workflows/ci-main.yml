---
name: CI main

permissions:
  contents: read

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  TEX_FILENAME: ${{ vars.TEX_FILENAME }}

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Build LaTex artifacts
        uses: ./.github/actions/build
      - name: Validate tag is semver
        env:
          TAG_NAME: ${{ github.ref_name }}
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: tag '$TAG_NAME' is not valid semver (expected vMAJOR.MINOR.PATCH)"
            exit 1
          fi
      - name: Create tagged release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release create \
            "$TAG_NAME" \
            --draft \
            --prerelease \
            "./output/${TEX_FILENAME}.pdf" "./output/${TEX_FILENAME}.png"
